name: UILPMLiOS
options:
  bundleIdPrefix: com.kelleyparker
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.kelleyparker.UILPMLiOS
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDarkContent
targets:
  UILPMLiOS:
    type: application
    platform: iOS
    sources:
      - path: UILPMLiOS
    settings:
      base:
        PRODUCT_NAME: UIL PML
        INFOPLIST_KEY_CFBundleDisplayName: UIL PML
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets: []
